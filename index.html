<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bio 4 — Karteikarten</title>
<style>
  :root {
    --bg: #fafaf9;
    --surface: #ffffff;
    --surface-elev: #ffffff;
    --ink: #0c0a09;
    --ink-soft: #44403c;
    --ink-mute: #78716c;
    --line: #e7e5e4;
    --line-strong: #d6d3d1;
    --accent: #0c0a09;
    --good: #166534;
    --bad: #991b1b;
    --shadow-sm: 0 1px 2px rgba(12,10,9,0.04);
    --shadow-md: 0 8px 24px -8px rgba(12,10,9,0.12), 0 2px 6px -2px rgba(12,10,9,0.06);
    --shadow-lg: 0 30px 60px -20px rgba(12,10,9,0.18), 0 12px 28px -12px rgba(12,10,9,0.10);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0c0a09;
      --surface: #1c1917;
      --surface-elev: #292524;
      --ink: #fafaf9;
      --ink-soft: #d6d3d1;
      --ink-mute: #a8a29e;
      --line: #292524;
      --line-strong: #44403c;
      --accent: #fafaf9;
      --good: #4ade80;
      --bad: #f87171;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 8px 24px -8px rgba(0,0,0,0.5), 0 2px 6px -2px rgba(0,0,0,0.3);
      --shadow-lg: 0 30px 60px -20px rgba(0,0,0,0.7), 0 12px 28px -12px rgba(0,0,0,0.4);
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body {
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    font-feature-settings: "ss01", "cv11";
    letter-spacing: -0.01em;
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    border-bottom: 1px solid var(--line);
    background: var(--surface);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .brand-dot {
    width: 8px; height: 8px;
    background: var(--ink);
    border-radius: 50%;
  }
  .brand-sub {
    color: var(--ink-mute);
    font-weight: 400;
    margin-left: 6px;
  }
  .topbar-right {
    font-variant-numeric: tabular-nums;
    font-size: 13px;
    color: var(--ink-mute);
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .counter-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 12px;
  }
  .counter-pill .dot {
    width: 6px; height: 6px; border-radius: 50%;
  }
  .counter-pill.good .dot { background: var(--good); }
  .counter-pill.bad .dot { background: var(--bad); }

  /* Filter strip */
  .filter-strip {
    padding: 14px 24px 4px;
    border-bottom: 1px solid var(--line);
    background: var(--surface);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .filter-strip::-webkit-scrollbar { display: none; }
  .filter-row {
    display: flex;
    gap: 6px;
    min-width: max-content;
    padding-bottom: 12px;
  }
  .chip {
    padding: 7px 14px;
    border-radius: 999px;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink-soft);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
    font-family: inherit;
    letter-spacing: -0.01em;
  }
  .chip:hover {
    border-color: var(--line-strong);
    color: var(--ink);
  }
  .chip.active {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  .chip-count {
    opacity: 0.55;
    margin-left: 6px;
    font-variant-numeric: tabular-nums;
    font-size: 12px;
  }

  /* Main */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 24px;
    max-width: 760px;
    margin: 0 auto;
    width: 100%;
  }

  /* Progress */
  .progress-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    font-size: 12px;
    color: var(--ink-mute);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .progress-bar {
    height: 2px;
    background: var(--line);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .progress-fill {
    height: 100%;
    background: var(--ink);
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
  }

  /* Card */
  .card-wrap {
    perspective: 2000px;
    margin-bottom: 24px;
  }
  .card {
    width: 100%;
    min-height: 420px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-side {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    background: var(--surface-elev);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 40px 36px;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow-md);
    overflow-y: auto;
  }
  .card:hover .card-side { box-shadow: var(--shadow-lg); }
  .card-back {
    transform: rotateY(180deg);
    background: var(--surface);
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-mute);
  }
  .card-side-label {
    color: var(--ink-mute);
    font-variant-numeric: tabular-nums;
  }
  .question {
    font-size: 26px;
    font-weight: 500;
    line-height: 1.35;
    color: var(--ink);
    letter-spacing: -0.02em;
    flex: 1;
    display: flex;
    align-items: center;
  }
  .answer {
    font-size: 17px;
    line-height: 1.6;
    color: var(--ink-soft);
    white-space: pre-line;
    flex: 1;
    display: flex;
    align-items: center;
    letter-spacing: -0.005em;
  }
  .answer-inner { width: 100%; }
  .flip-hint {
    position: absolute;
    bottom: 18px;
    left: 36px;
    font-size: 11px;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    display: flex;
    align-items: center;
    gap: 6px;
    opacity: 0.7;
  }
  .kbd {
    display: inline-block;
    padding: 2px 6px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 4px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 10px;
    color: var(--ink-soft);
    letter-spacing: 0;
  }

  /* Controls */
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .btn {
    padding: 14px 20px;
    border: 1px solid var(--line-strong);
    border-radius: 12px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    background: var(--surface);
    color: var(--ink);
    transition: all 0.15s ease;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .btn:hover {
    background: var(--bg);
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
  }
  .btn:active { transform: translateY(0); }
  .btn .kbd {
    background: var(--bg);
    border-color: var(--line);
  }
  .btn-primary {
    grid-column: span 2;
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  .btn-primary:hover { background: var(--ink-soft); }
  .btn-primary .kbd {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.2);
    color: var(--bg);
  }
  @media (prefers-color-scheme: dark) {
    .btn-primary .kbd {
      background: rgba(0,0,0,0.2);
      border-color: rgba(0,0,0,0.3);
    }
  }

  /* Done screen */
  .done {
    background: var(--surface-elev);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 60px 40px;
    text-align: center;
    box-shadow: var(--shadow-md);
  }
  .done-mark {
    font-size: 28px;
    margin-bottom: 16px;
    letter-spacing: 0.2em;
    color: var(--ink-mute);
  }
  .done h2 {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  .done p {
    color: var(--ink-mute);
    margin-bottom: 28px;
    font-size: 14px;
  }
  .done-stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 28px;
  }
  .done-stat {
    text-align: center;
  }
  .done-stat-num {
    font-size: 32px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.03em;
    color: var(--ink);
  }
  .done-stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-mute);
    margin-top: 4px;
  }

  @media (max-width: 600px) {
    .topbar { padding: 14px 16px; }
    main { padding: 16px; }
    .card-side { padding: 28px 24px; }
    .question { font-size: 22px; }
    .answer { font-size: 16px; }
    .card, .card-side { min-height: 380px; }
    .flip-hint { left: 24px; bottom: 14px; }
    .topbar-right .kbd-hint { display: none; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="brand-dot"></span>
    Bio 4
    <span class="brand-sub">— Karteikarten</span>
  </div>
  <div class="topbar-right">
    <span class="counter-pill good"><span class="dot"></span><span id="rightCount">0</span></span>
    <span class="counter-pill bad"><span class="dot"></span><span id="wrongCount">0</span></span>
  </div>
</header>

<nav class="filter-strip">
  <div class="filter-row" id="filterBar"></div>
</nav>

<main>
  <div class="progress-row">
    <span id="progress">— / —</span>
    <span id="topicLabel"></span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div id="cardArea">
    <div class="card-wrap">
      <div class="card" id="card" onclick="flip()">
        <div class="card-side card-front">
          <div class="card-header">
            <span id="topicTag">Thema</span>
            <span class="card-side-label">Frage</span>
          </div>
          <div class="question" id="question">Lade Karte…</div>
          <div class="flip-hint">Karte umdrehen <span class="kbd">Leertaste</span></div>
        </div>
        <div class="card-side card-back">
          <div class="card-header">
            <span id="topicTag2">Thema</span>
            <span class="card-side-label">Antwort</span>
          </div>
          <div class="answer"><div class="answer-inner" id="answer">…</div></div>
          <div class="flip-hint">Zurück <span class="kbd">Leertaste</span></div>
        </div>
      </div>
    </div>

    <div class="controls" id="controls">
      <button class="btn" onclick="markWrong()" aria-label="Nochmal üben">
        Nochmal üben
        <span class="kbd">←</span>
      </button>
      <button class="btn" onclick="markRight()" aria-label="Kann ich">
        Kann ich
        <span class="kbd">→</span>
      </button>
      <button class="btn btn-primary" onclick="next()" aria-label="Weiter">
        Weiter
        <span class="kbd">↵</span>
      </button>
    </div>
  </div>
</main>

<script>
const cards = [
  // ===================== IMMUNSYSTEM =====================
  { topic: "Immunsystem", q: "Was ist das angeborene Immunsystem?",
    a: "Das angeborene Immunsystem hast du von Geburt an. Es reagiert SCHNELL. Es ist UNSPEZIFISCH — das heißt: Es reagiert gleich auf alle Erreger." },
  { topic: "Immunsystem", q: "Was ist das erworbene Immunsystem?",
    a: "Das erworbene Immunsystem reagiert LANGSAMER, aber GEZIELT. Das heißt: Es kämpft gegen einen bestimmten Erreger. Es bildet Gedächtniszellen. Man kann es durch Impfen stärker machen." },
  { topic: "Immunsystem", q: "Wie reagiert das angeborene Immunsystem?",
    a: "Schnell und unspezifisch. Es reagiert gleich auf alle Erreger." },
  { topic: "Immunsystem", q: "Wie reagiert das erworbene Immunsystem?",
    a: "Langsamer, aber gezielt. Es reagiert auf einen bestimmten Erreger." },
  { topic: "Immunsystem", q: "Welche Barrieren hat das angeborene Immunsystem?",
    a: "• Haut\n• Schleimhäute\n• Magensäure\n\nDiese Barrieren halten Erreger draußen." },
  { topic: "Immunsystem", q: "Was machen Fresszellen?",
    a: "Sie „fressen\" die Erreger — also: sie machen die Erreger kaputt.\n\nFresszellen sind Teil vom angeborenen Immunsystem." },
  { topic: "Immunsystem", q: "Was machen Killerzellen?",
    a: "Sie töten Körperzellen, die mit Erregern infiziert sind.\n\nKillerzellen sind Teil vom angeborenen Immunsystem." },
  { topic: "Immunsystem", q: "Was machen T-Zellen?",
    a: "T-Zellen helfen anderen Abwehrzellen. Sie töten auch infizierte Zellen.\n\nT-Zellen sind Teil vom erworbenen Immunsystem." },
  { topic: "Immunsystem", q: "Was machen B-Zellen?",
    a: "B-Zellen bilden Antikörper. Mit Antikörpern erkennen sie Erreger und bekämpfen sie.\n\nB-Zellen sind Teil vom erworbenen Immunsystem." },
  { topic: "Immunsystem", q: "Was sind Antikörper?",
    a: "Antikörper sind kleine Stoffe. Die B-Zellen bilden sie. Antikörper erkennen Erreger und bekämpfen sie." },
  { topic: "Immunsystem", q: "Was sind Gedächtniszellen?",
    a: "Gedächtniszellen merken sich einen Erreger.\n\nKommt der Erreger nochmal — kann der Körper schneller reagieren." },
  { topic: "Immunsystem", q: "Wie kann man das erworbene Immunsystem stärker machen?",
    a: "Durch IMPFEN." },
  { topic: "Immunsystem", q: "Nenne 4 Teile des angeborenen Immunsystems.",
    a: "• Barrieren (Haut, Schleimhäute, Magensäure)\n• Fresszellen\n• Komplementsystem\n• Entzündungsreaktion" },
  { topic: "Immunsystem", q: "Welche 4 Erreger machen den Menschen krank?",
    a: "• Viren\n• Bakterien\n• Pilze\n• Parasiten" },
  { topic: "Immunsystem", q: "Nenne 5 Dinge, die das Immunsystem gesund halten.",
    a: "• Gesund essen\n• Saubere Luft\n• Sonne\n• Bewegung\n• Genug Schlaf\n• Hygiene\n• Kein Stress (psychisch stabil)" },
  { topic: "Immunsystem", q: "Warum ist Hygiene wichtig für das Immunsystem?",
    a: "Mit guter Hygiene hat man weniger Kontakt mit Erregern. Der Körper wird seltener krank." },
  { topic: "Immunsystem", q: "Was ist eine Entzündungsreaktion?",
    a: "Wenn der Körper verletzt oder infiziert ist — kommt eine Entzündung. Sie zieht Abwehrzellen an. Die Abwehrzellen kämpfen gegen die Erreger.\n\nDie Entzündungsreaktion ist Teil vom angeborenen Immunsystem." },

  // ===================== ERNÄHRUNG =====================
  { topic: "Ernährung", q: "Welche 3 wichtigen Nährstoff-Gruppen gibt es?",
    a: "• Kohlenhydrate\n• Eiweiß (Proteine)\n• Fette" },
  { topic: "Ernährung", q: "Wofür braucht der Körper Kohlenhydrate?",
    a: "Kohlenhydrate geben dem Körper SCHNELL Energie." },
  { topic: "Ernährung", q: "Wofür braucht der Körper Eiweiß?",
    a: "Eiweiß ist der BAUSTOFF — der Körper baut damit zum Beispiel Muskeln, Haare und Zellen." },
  { topic: "Ernährung", q: "Wofür braucht der Körper Fette?",
    a: "Fette geben SEHR VIEL Energie. Der Körper kann Fett auch speichern." },
  { topic: "Ernährung", q: "Was sind Ballaststoffe?",
    a: "Ballaststoffe sind Teile von Pflanzen. Der Körper kann sie nicht verdauen." },
  { topic: "Ernährung", q: "In welchem Essen sind viele Ballaststoffe?",
    a: "Zum Beispiel in:\n• Vollkorn (Brot, Nudeln)\n• Obst\n• Gemüse" },
  { topic: "Ernährung", q: "Was machen Ballaststoffe im Körper?",
    a: "• Sie werden im Darm größer (sie „quellen auf\")\n• Sie helfen dem Darm beim Arbeiten\n• Sie machen lange satt\n\nBallaststoffe sind gesund." },
  { topic: "Ernährung", q: "Stimmt das? — „Ballaststoffe sind schlecht für den Körper.\"",
    a: "FALSCH! Ballaststoffe sind GUT für den Körper. Sie helfen dem Darm und machen lange satt." },
  { topic: "Ernährung", q: "Was ist eine gesunde Ernährung?",
    a: "Eine Ernährung mit allen wichtigen Nährstoffen:\n• Kohlenhydrate\n• Eiweiß\n• Fette\n\nDazu viel Obst, Gemüse und Ballaststoffe." },

  // ===================== BLUT =====================
  { topic: "Blut", q: "Was bringt das Blut zu den Organen?",
    a: "Das Blut bringt SAUERSTOFF und NÄHRSTOFFE zu den Organen.\n\nEs nimmt CO₂ und andere Abfälle wieder mit." },
  { topic: "Blut", q: "Was hat Blut mit der Körpertemperatur zu tun?",
    a: "Das Blut hilft, die Körpertemperatur zu regulieren — also: nicht zu warm, nicht zu kalt." },
  { topic: "Blut", q: "Was transportiert das Blut noch — außer Sauerstoff und Nährstoffen?",

  { topic: "Blut", q: "Wie hilft das Blut gegen Krankheiten?",

  { topic: "Blut", q: "Wie hilft das Blut bei Verletzungen?",

  { topic: "Blut", q: "Nenne 5 Aufgaben vom Blut.",
    a: "• Bringt Sauerstoff und Nährstoffe zu den Organen\n• Nimmt CO₂ und Abfälle mit\n• Reguliert die Körpertemperatur\n• Transportiert Hormone\n• Kämpft gegen Erreger\n• Hilft bei der Wundheilung" },
  { topic: "Blut", q: "Aus welchen 4 Teilen besteht das Blut?",
    a: "• Rote Blutkörperchen\n• Weiße Blutkörperchen\n• Blutplättchen\n• Blutplasma" },
  { topic: "Blut", q: "Was machen die ROTEN Blutkörperchen?",

  { topic: "Blut", q: "Was machen die WEISSEN Blutkörperchen?",

  { topic: "Blut", q: "Was machen die Blutplättchen?",
    a: "Sie sorgen dafür, dass das Blut bei Verletzungen fest wird. So heilt die Wunde (Blutgerinnung)." },
  { topic: "Blut", q: "Was ist Blutplasma?",
    a: "Blutplasma ist eine gelbe Flüssigkeit. Sie transportiert:\n• Proteine\n• Nährstoffe\n• Blutzellen\n\ndurch den Körper." },

  // ===================== HERZ & KREISLAUF =====================
  { topic: "Herz & Kreislauf", q: "Was für ein Organ ist das Herz?",
    a: "Das Herz ist ein HOHLMUSKEL — ein Muskel mit einem Loch innen." },
  { topic: "Herz & Kreislauf", q: "Was ist die Aufgabe vom Herz?",
    a: "Das Herz PUMPT das Blut durch den Körper — zu allen Organen." },
  { topic: "Herz & Kreislauf", q: "Wie heißt der „kleine Blutkreislauf\"?",
    a: "LUNGENKREISLAUF (Blut zur Lunge und zurück)." },
  { topic: "Herz & Kreislauf", q: "Wie heißt der „große Blutkreislauf\"?",
    a: "KÖRPERKREISLAUF (Blut zu den Organen und zurück)." },
  { topic: "Herz & Kreislauf", q: "Was passiert im Lungenkreislauf?",
    a: "Das Blut fließt durch die Lunge. Dort:\n• gibt das Blut CO₂ ab\n• nimmt das Blut Sauerstoff auf\n\nDas heißt: GASAUSTAUSCH." },
  { topic: "Herz & Kreislauf", q: "Was passiert im Körperkreislauf?",
    a: "Das Blut fließt zu den Organen und Zellen.\n• Es bringt Sauerstoff und Nährstoffe\n• Es nimmt CO₂ und Abfälle wieder mit" },
  { topic: "Herz & Kreislauf", q: "Wo passiert der Gasaustausch?",
    a: "In der LUNGE.\n\n• CO₂ raus aus dem Blut\n• Sauerstoff rein ins Blut" },
  { topic: "Herz & Kreislauf", q: "Wie kommt das Blut von der rechten Herzkammer zur Lunge?",
    a: "Durch die LUNGENARTERIE." },
  { topic: "Herz & Kreislauf", q: "Wie kommt das Blut mit Sauerstoff zurück zum Herz?",
    a: "Durch die LUNGENVENE — es kommt in die linke Herzkammer." },
  { topic: "Herz & Kreislauf", q: "Wohin geht das Blut aus der linken Herzkammer?",
    a: "In den Körperkreislauf — zu allen Organen." },
  { topic: "Herz & Kreislauf", q: "Beschreibe den Weg: Herz → Lunge → Herz",

let currentDeck = [...cards];
let idx = 0;
let stats = { right: 0, wrong: 0, seen: new Set() };
let activeFilter = "Alle";
let isDone = false;

const topics = ["Alle", ...new Set(cards.map(c => c.topic))];

function renderFilters() {
  const bar = document.getElementById("filterBar");
  bar.innerHTML = "";
  topics.forEach(t => {
    const btn = document.createElement("button");
    btn.className = "chip" + (t === activeFilter ? " active" : "");
    const count = (t === "Alle") ? cards.length : cards.filter(c => c.topic === t).length;
    btn.innerHTML = `${t}<span class="chip-count">${count}</span>`;
    btn.onclick = () => setFilter(t);
    bar.appendChild(btn);
  });
}

function setFilter(t) {
  activeFilter = t;
  currentDeck = (t === "Alle") ? [...cards] : cards.filter(c => c.topic === t);
  shuffle(currentDeck);
  idx = 0;
  isDone = false;
  stats = { right: 0, wrong: 0, seen: new Set() };
  renderFilters();
  document.getElementById("cardArea").innerHTML = `
    <div class="card-wrap">
      <div class="card" id="card" onclick="flip()">
        <div class="card-side card-front">
          <div class="card-header">
            <span id="topicTag">Thema</span>
            <span class="card-side-label">Frage</span>
          </div>
          <div class="question" id="question">…</div>
          <div class="flip-hint">Karte umdrehen <span class="kbd">Leertaste</span></div>
        </div>
        <div class="card-side card-back">
          <div class="card-header">
            <span id="topicTag2">Thema</span>
            <span class="card-side-label">Antwort</span>
          </div>
          <div class="answer"><div class="answer-inner" id="answer">…</div></div>
          <div class="flip-hint">Zurück <span class="kbd">Leertaste</span></div>
        </div>
      </div>
    </div>
    <div class="controls">
      <button class="btn" onclick="markWrong()">Nochmal üben<span class="kbd">←</span></button>
      <button class="btn" onclick="markRight()">Kann ich<span class="kbd">→</span></button>
      <button class="btn btn-primary" onclick="next()">Weiter<span class="kbd">↵</span></button>
    </div>`;
  render();
}

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
}

function render() {
  document.getElementById("rightCount").textContent = stats.right;
  document.getElementById("wrongCount").textContent = stats.wrong;

  if (idx >= currentDeck.length) {
    isDone = true;
    const total = stats.right + stats.wrong;
    const pct = total > 0 ? Math.round(100 * stats.right / total) : 0;
    document.getElementById("cardArea").innerHTML = `
      <div class="done">
        <div class="done-mark">— ENDE —</div>
        <h2>Durch.</h2>
        <p>${activeFilter} · ${total} Karten beantwortet</p>
        <div class="done-stats">
          <div class="done-stat">
            <div class="done-stat-num">${stats.right}</div>
            <div class="done-stat-label">Gewusst</div>
          </div>
          <div class="done-stat">
            <div class="done-stat-num">${stats.wrong}</div>
            <div class="done-stat-label">Nochmal</div>
          </div>
          <div class="done-stat">
            <div class="done-stat-num">${pct}%</div>
            <div class="done-stat-label">Quote</div>
          </div>
        </div>
        <button class="btn btn-primary" style="grid-column:auto;display:inline-flex;" onclick="setFilter(activeFilter)">Nochmal von vorn</button>
      </div>`;
    document.getElementById("progressFill").style.width = "100%";
    document.getElementById("progress").textContent = `${currentDeck.length} / ${currentDeck.length}`;
    document.getElementById("topicLabel").textContent = "";
    return;
  }
  const c = currentDeck[idx];
  document.getElementById("topicTag").textContent = c.topic;
  document.getElementById("topicTag2").textContent = c.topic;
  document.getElementById("question").textContent = c.q;
  document.getElementById("answer").textContent = c.a;
  document.getElementById("card").classList.remove("flipped");
  document.getElementById("progress").textContent = `${idx + 1} / ${currentDeck.length}`;
  document.getElementById("topicLabel").textContent = activeFilter;
  document.getElementById("progressFill").style.width = `${(idx / currentDeck.length) * 100}%`;
}

function flip() {
  if (isDone) return;
  document.getElementById("card").classList.toggle("flipped");
}
function next() {
  if (isDone) return;
  idx++;
  render();
}
function markRight() {
  if (isDone) return;
  if (!stats.seen.has(idx)) { stats.right++; stats.seen.add(idx); }
  next();
}
function markWrong() {
  if (isDone) return;
  if (!stats.seen.has(idx)) { stats.wrong++; stats.seen.add(idx); }
  const c = currentDeck[idx];
  currentDeck.push(c);
  next();
}

// Keyboard shortcuts
document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  if (e.key === " ") { e.preventDefault(); flip(); }
  else if (e.key === "ArrowRight") { e.preventDefault(); markRight(); }
  else if (e.key === "ArrowLeft") { e.preventDefault(); markWrong(); }
  else if (e.key === "Enter") { e.preventDefault(); next(); }
});

shuffle(currentDeck);
renderFilters();
render();
</script>
